<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Login Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .step { margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 5px; }
        .result { margin: 15px 0; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .debug { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 FINAL LOGIN FIX</h1>
        
        <div class="step">
            <h3>Step 1: Test Backend Connection</h3>
            <button onclick="testBackend()">Test Backend</button>
            <div id="backendResult"></div>
        </div>
        
        <div class="step">
            <h3>Step 2: Login Test</h3>
            <input type="email" id="email" value="admin@test.com" placeholder="Email">
            <input type="password" id="password" value="admin123" placeholder="Password">
            <button onclick="testLogin()">Test Login</button>
            <div id="loginResult"></div>
            <div id="loginDebug"></div>
        </div>
        
        <div class="step">
            <h3>Step 3: Manual Login Test</h3>
            <button onclick="manualLogin()">Manual Login Form</button>
            <div id="manualResult"></div>
        </div>
        
        <div class="step">
            <h3>Step 4: Open Working Apps</h3>
            <button onclick="openSimpleTest()">Open Simple Test</button>
            <button onclick="openMainApp()">Open Main App</button>
            <button onclick="openOriginalApp()">Open Original App</button>
            <div id="appsResult"></div>
        </div>
        
        <div class="step">
            <h3>Step 5: Clear and Reset</h3>
            <button onclick="clearStorage()">Clear Browser Storage</button>
            <button onclick="resetAndGo()">Reset & Go to App</button>
            <div id="resetResult"></div>
        </div>
    </div>

    <script>
        const API_BASE = `http://${window.location.hostname}:5000/api`;
        
        // Step 1: Test backend
        async function testBackend() {
            const result = document.getElementById('backendResult');
            result.innerHTML = '<div class="info">Testing backend...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/quote`);
                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `
                        <div class="success">
                            ✅ Backend is working!<br>
                            Quote: ${data.quote}
                        </div>
                    `;
                } else {
                    result.innerHTML = `<div class="error">❌ Backend error: ${response.status}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="error">❌ Backend connection failed: ${error.message}</div>`;
            }
        }
        
        // Step 2: Login test
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('loginResult');
            const debug = document.getElementById('loginDebug');
            
            result.innerHTML = '<div class="info">Testing login...</div>';
            
            const requestData = { email, password };
            
            debug.innerHTML = `
                <div class="debug">
                    <strong>Request Details:</strong><br>
                    URL: ${API_BASE}/auth/login<br>
                    Method: POST<br>
                    Headers: Content-Type: application/json<br>
                    Body: ${JSON.stringify(requestData, null, 2)}
                </div>
            `;
            
            try {
                console.log('=== LOGIN TEST START ===');
                console.log('Request URL:', `${API_BASE}/auth/login`);
                console.log('Request Data:', requestData);
                
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });
                
                console.log('Response Status:', response.status);
                console.log('Response Headers:', [...response.headers.entries()]);
                
                const data = await response.json();
                console.log('Response Data:', data);
                console.log('=== LOGIN TEST END ===');
                
                debug.innerHTML += `
                    <div class="debug">
                        <strong>Response Details:</strong><br>
                        Status: ${response.status}<br>
                        Status Text: ${response.statusText}<br>
                        Data: ${JSON.stringify(data, null, 2)}
                    </div>
                `;
                
                if (response.ok && data.status === 'success') {
                    result.innerHTML = `
                        <div class="success">
                            ✅ LOGIN SUCCESSFUL!<br>
                            User: ${data.user.name}<br>
                            Email: ${data.user.email}<br>
                            Token: ${data.token.substring(0, 20)}...<br>
                            <button onclick="storeAndContinue('${data.token}', '${JSON.stringify(data.user).replace(/"/g, '\\"')}')">Continue to App</button>
                        </div>
                    `;
                } else {
                    result.innerHTML = `
                        <div class="error">
                            ❌ LOGIN FAILED<br>
                            Error: ${data.error || 'Unknown error'}<br>
                            Status: ${response.status}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Login error:', error);
                debug.innerHTML += `
                    <div class="debug">
                        <strong>JavaScript Error:</strong><br>
                        ${error.message}<br>
                        ${error.stack}
                    </div>
                `;
                result.innerHTML = `<div class="error">❌ JavaScript Error: ${error.message}</div>`;
            }
        }
        
        // Step 3: Manual login form
        function manualLogin() {
            const result = document.getElementById('manualResult');
            result.innerHTML = `
                <form onsubmit="handleManualLogin(event)">
                    <input type="email" value="admin@test.com" placeholder="Email" required>
                    <input type="password" value="admin123" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <div id="manualLoginResult"></div>
            `;
        }
        
        async function handleManualLogin(event) {
            event.preventDefault();
            const form = event.target;
            const email = form[0].value;
            const password = form[1].value;
            const result = document.getElementById('manualLoginResult');
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    result.innerHTML = `
                        <div class="success">
                            ✅ Manual login successful!<br>
                            <button onclick="storeAndContinue('${data.token}', '${JSON.stringify(data.user).replace(/"/g, '\\"')}')">Continue to App</button>
                        </div>
                    `;
                } else {
                    result.innerHTML = `<div class="error">❌ Manual login failed: ${data.error}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="error">❌ Manual login error: ${error.message}</div>`;
            }
        }
        
        // Step 4: Open working apps
        function openSimpleTest() {
            window.open('simple_test.html', '_blank');
            document.getElementById('appsResult').innerHTML = '<div class="info">Opened simple_test.html</div>';
        }
        
        function openMainApp() {
            window.open('index_ui_fixed.html', '_blank');
            document.getElementById('appsResult').innerHTML = '<div class="info">Opened index_ui_fixed.html</div>';
        }
        
        function openOriginalApp() {
            window.open('index_simple.html', '_blank');
            document.getElementById('appsResult').innerHTML = '<div class="info">Opened index_simple.html</div>';
        }
        
        // Step 5: Clear and reset
        function clearStorage() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('resetResult').innerHTML = '<div class="success">✅ Browser storage cleared</div>';
        }
        
        function resetAndGo() {
            localStorage.clear();
            sessionStorage.clear();
            
            // Set fresh login data
            const loginData = {
                token: 'test-token',
                user: { id: 2, name: 'Test User', email: 'admin@test.com' }
            };
            
            localStorage.setItem('token', loginData.token);
            localStorage.setItem('user', JSON.stringify(loginData.user));
            
            document.getElementById('resetResult').innerHTML = `
                <div class="success">
                    ✅ Reset complete!<br>
                    <button onclick="window.location.href='index_ui_fixed.html'">Go to App</button>
                </div>
            `;
        }
        
        function storeAndContinue(token, user) {
            localStorage.setItem('token', token);
            localStorage.setItem('user', user);
            window.location.href = 'index_ui_fixed.html';
        }
        
        // Auto-test backend on load
        window.addEventListener('load', function() {
            testBackend();
        });
    </script>
</body>
</html>
