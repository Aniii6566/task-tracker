<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Tracker - Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <h1 class="app-title">📋 Daily Tracker</h1>
                    <div class="current-date" id="currentDate">Loading...</div>
                </div>
                <div class="header-right">
                    <div class="streak-display" id="streakDisplay">
                        <i class="fas fa-fire"></i>
                        <span id="streakCount">0</span> days
                    </div>
                    <div class="nav-tabs">
                        <button class="tab-btn active" data-view="tasks">Tasks</button>
                        <button class="tab-btn" data-view="analytics">Analytics</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Tasks View -->
            <div class="view" id="tasksView">
                <!-- Add Task Section -->
                <section class="add-task-section">
                    <div class="add-task-container">
                        <div class="input-group">
                            <input 
                                type="text" 
                                id="taskInput" 
                                class="task-input" 
                                placeholder="What needs to be done today?"
                                autocomplete="off"
                            >
                            <button id="addTaskBtn" class="add-btn">
                                <i class="fas fa-plus"></i>
                                Add Task
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Tasks Container -->
                <div class="tasks-container">
                    <!-- Active Tasks -->
                    <section class="task-section">
                        <div class="section-header">
                            <h2 class="section-title">
                                <i class="fas fa-fire"></i>
                                Today's Tasks
                            </h2>
                        </div>
                        <div class="task-list" id="activeTasks">
                            <div class="empty-state">
                                <i class="fas fa-rocket"></i>
                                <p>No tasks today 🚀</p>
                            </div>
                        </div>
                    </section>

                    <!-- Completed Tasks -->
                    <section class="task-section">
                        <div class="section-header">
                            <h2 class="section-title">
                                <i class="fas fa-check-circle"></i>
                                Completed Tasks
                            </h2>
                        </div>
                        <div class="task-list" id="completedTasks">
                            <div class="empty-state">
                                <i class="fas fa-clipboard-check"></i>
                                <p>No completed tasks yet</p>
                            </div>
                        </div>
                    </section>
                </div>
            </div>

            <!-- Analytics View -->
            <div class="view hidden" id="analyticsView">
                <div class="analytics-container">
                    <!-- Analytics Controls -->
                    <div class="analytics-controls">
                        <div class="filter-buttons">
                            <button class="filter-btn active" data-period="daily">Daily</button>
                            <button class="filter-btn" data-period="weekly">Weekly</button>
                            <button class="filter-btn" data-period="monthly">Monthly</button>
                        </div>
                    </div>

                    <!-- Analytics Stats -->
                    <div class="analytics-stats">
                        <div class="stat-card">
                            <div class="stat-label">Total Completed</div>
                            <div class="stat-value" id="totalCompleted">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Average per Day</div>
                            <div class="stat-value" id="avgPerDay">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Productive Days</div>
                            <div class="stat-value" id="productiveDays">0</div>
                        </div>
                    </div>

                    <!-- Chart Container -->
                    <div class="chart-container">
                        <h3 class="chart-title">Completed Tasks</h3>
                        <div class="chart" id="chart">
                            <canvas id="chartCanvas" width="800" height="400"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
