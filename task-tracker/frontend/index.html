<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Activity Tracker - Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Mobile Menu Button -->
        <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" onclick="closeSidebar()"></div>

        <!-- Login Screen -->
        <div id="loginScreen" class="login-container">
            <div class="login-card">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-accent rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-tasks text-3xl text-white"></i>
                    </div>
                    <h1 class="text-3xl font-bold mb-2">TaskTracker Pro</h1>
                    <p class="text-gray-400">Professional Task Management</p>
                </div>

                <form id="loginForm" class="space-y-6">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" style="left: 1rem; top: 0.875rem;"></i>
                            <input type="email" id="email" value="admin@test.com" required
                                   class="form-input" style="padding-left: 2.5rem;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" style="left: 1rem; top: 0.875rem;"></i>
                            <input type="password" id="password" value="admin123" required
                                   class="form-input" style="padding-left: 2.5rem;">
                        </div>
                    </div>

                    <button type="submit" id="loginBtn" class="btn btn-primary w-full">
                        <span class="btn-text">Sign In</span>
                        <div class="loading hidden"></div>
                    </button>
                </form>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboardScreen" class="hidden">
            <div class="app-container">
                <!-- Sidebar -->
                <aside class="sidebar" id="sidebar">
                    <div class="sidebar-content">
                        <div class="text-center mb-8">
                            <div class="w-12 h-12 bg-accent rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-tasks text-white"></i>
                            </div>
                            <h2 class="text-lg font-bold text-white">TaskTracker</h2>
                        </div>

                        <nav class="space-y-2">
                            <button onclick="showDashboard()" class="btn btn-secondary w-full text-left">
                                <i class="fas fa-home mr-3"></i>Dashboard
                            </button>
                            <button onclick="showTasks()" class="btn btn-secondary w-full text-left">
                                <i class="fas fa-tasks mr-3"></i>Tasks
                            </button>
                            <button onclick="showAnalytics()" class="btn btn-secondary w-full text-left">
                                <i class="fas fa-chart-bar mr-3"></i>Analytics
                            </button>
                            <button onclick="showSettings()" class="btn btn-secondary w-full text-left">
                                <i class="fas fa-cog mr-3"></i>Settings
                            </button>
                            <button onclick="logout()" class="btn btn-danger w-full text-left mt-8">
                                <i class="fas fa-sign-out-alt mr-3"></i>Logout
                            </button>
                        </nav>
                    </div>
                </aside>

                <!-- Main Content -->
                <main class="main-content" id="mainContent">
                    <div class="container">
                        <!-- Dashboard Content -->
                        <div id="dashboardContent" class="fade-in">
                            <h1 class="text-3xl font-bold mb-8">Dashboard</h1>
                            
                            <div class="metrics-grid">
                                <div class="metric-card">
                                    <div class="metric-header">
                                        <div class="metric-icon bg-accent">
                                            <i class="fas fa-tasks"></i>
                                        </div>
                                        <div>
                                            <p class="metric-label">Total Tasks</p>
                                            <p class="metric-value" id="totalTasks">0</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="metric-card">
                                    <div class="metric-header">
                                        <div class="metric-icon bg-success">
                                            <i class="fas fa-check"></i>
                                        </div>
                                        <div>
                                            <p class="metric-label">Completed</p>
                                            <p class="metric-value" id="completedTasks">0</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="metric-card">
                                    <div class="metric-header">
                                        <div class="metric-icon bg-warning">
                                            <i class="fas fa-clock"></i>
                                        </div>
                                        <div>
                                            <p class="metric-label">Pending</p>
                                            <p class="metric-value" id="pendingTasks">0</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Quick Add Task -->
                            <div class="card">
                                <h3 class="text-xl font-bold mb-4">Quick Add Task</h3>
                                <form id="quickAddForm" class="flex gap-4">
                                    <input type="text" id="quickTaskTitle" placeholder="Enter task title..." 
                                           class="form-input flex-1">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-plus mr-2"></i>Add Task
                                    </button>
                                </form>
                            </div>

                            <!-- Recent Tasks -->
                            <div class="card">
                                <h3 class="text-xl font-bold mb-4">Recent Tasks</h3>
                                <div id="recentTasks" class="space-y-4">
                                    <p class="text-gray-500 text-center">No tasks yet. Add your first task above!</p>
                                </div>
                            </div>
                        </div>

                        <!-- Tasks Content -->
                        <div id="tasksContent" class="hidden fade-in">
                            <div class="flex justify-between items-center mb-8">
                                <h1 class="text-3xl font-bold">Tasks</h1>
                                <button onclick="showAddTaskModal()" class="btn btn-primary">
                                    <i class="fas fa-plus mr-2"></i>Add Task
                                </button>
                            </div>

                            <div class="card">
                                <div id="tasksList" class="space-y-4">
                                    <p class="text-gray-500 text-center">No tasks found.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Analytics Content -->
                        <div id="analyticsContent" class="hidden fade-in">
                            <h1 class="text-3xl font-bold mb-8">Analytics</h1>
                            
                            <div class="grid grid-cols-2">
                                <div class="card">
                                    <h3 class="text-xl font-bold mb-4">Task Status</h3>
                                    <canvas id="statusChart"></canvas>
                                </div>
                                
                                <div class="card">
                                    <h3 class="text-xl font-bold mb-4">Weekly Progress</h3>
                                    <canvas id="weeklyChart"></canvas>
                                </div>
                            </div>
                        </div>

                        <!-- Settings Content -->
                        <div id="settingsContent" class="hidden fade-in">
                            <h1 class="text-3xl font-bold mb-8">Settings</h1>
                            
                            <div class="card max-w-lg">
                                <h3 class="text-xl font-bold mb-4">Profile</h3>
                                <form id="profileForm" class="space-y-6">
                                    <div class="form-group">
                                        <label class="form-label">Name</label>
                                        <input type="text" id="userName" class="form-input">
                                    </div>
                                    
                                    <div class="form-group">
                                        <label class="form-label">Email</label>
                                        <input type="email" id="userEmail" class="form-input" readonly>
                                    </div>
                                    
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save mr-2"></i>Save Changes
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
