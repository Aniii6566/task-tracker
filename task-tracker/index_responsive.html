<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Activity Tracker - Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --sidebar: #1e293b;
            --card: #ffffff;
            --accent: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Responsive Typography */
        html {
            font-size: 16px;
        }

        @media (max-width: 768px) {
            html {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            html {
                font-size: 12px;
            }
        }

        /* Layout Containers */
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 1rem;
        }

        @media (min-width: 640px) {
            .container {
                padding: 0 2rem;
            }
        }

        @media (min-width: 1024px) {
            .container {
                max-width: 1280px;
            }
        }

        /* Sidebar */
        .sidebar {
            background-color: var(--sidebar);
            border-right: 1px solid #e2e8f0;
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                z-index: 50;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }
        }

        /* Main Content */
        .main-content {
            flex: 1;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Cards */
        .card {
            background-color: var(--card);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            margin-bottom: 1rem;
            width: 100%;
        }

        @media (max-width: 768px) {
            .card {
                padding: 1rem;
                margin-bottom: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 0.75rem;
                margin-bottom: 0.5rem;
                border-radius: 8px;
            }
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            min-height: 44px; /* Touch-friendly */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 768px) {
            .btn {
                padding: 0.625rem 1.25rem;
                font-size: 0.8125rem;
                min-height: 40px;
            }
        }

        @media (max-width: 480px) {
            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
                min-height: 36px;
                width: 100%;
                margin-bottom: 0.5rem;
            }
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

        .btn-success:hover {
            background-color: #16a34a;
            transform: translateY(-1px);
        }

        .btn-warning {
            background-color: var(--warning);
            color: white;
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-secondary {
            background-color: #6b7280;
            color: white;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        @media (max-width: 768px) {
            .form-group {
                margin-bottom: 1rem;
            }
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        @media (max-width: 480px) {
            .form-label {
                font-size: 0.8125rem;
                margin-bottom: 0.375rem;
            }
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.875rem;
            transition: border-color 0.2s ease;
            background-color: white;
            color: #1f2937;
        }

        @media (max-width: 768px) {
            .form-input {
                padding: 0.625rem 0.875rem;
                font-size: 0.8125rem;
            }
        }

        @media (max-width: 480px) {
            .form-input {
                padding: 0.5rem 0.75rem;
                font-size: 0.75rem;
                min-height: 44px; /* Touch-friendly */
            }
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Task Items */
        .task-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            background-color: white;
            transition: all 0.2s ease;
        }

        @media (max-width: 768px) {
            .task-item {
                padding: 0.75rem;
                margin-bottom: 0.5rem;
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            .task-item {
                padding: 0.5rem;
                margin-bottom: 0.375rem;
                border-radius: 6px;
            }
        }

        .task-item:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        .task-title {
            flex: 1;
            font-weight: 500;
            margin: 0 1rem;
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            .task-title {
                margin: 0.5rem 0;
                font-size: 0.8125rem;
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .task-title {
                font-size: 0.75rem;
                margin: 0.375rem 0;
            }
        }

        /* Priority and Status Badges */
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .badge {
                padding: 0.1875rem 0.5rem;
                font-size: 0.6875rem;
            }
        }

        .priority-high {
            background-color: var(--danger);
            color: white;
        }

        .priority-medium {
            background-color: var(--warning);
            color: white;
        }

        .priority-low {
            background-color: var(--success);
            color: white;
        }

        .status-pending {
            background-color: #6b7280;
            color: white;
        }

        .status-in-progress {
            background-color: var(--accent);
            color: white;
        }

        .status-completed {
            background-color: var(--success);
            color: white;
        }

        /* Grid Layouts */
        .grid {
            display: grid;
            gap: 1.5rem;
        }

        .grid-cols-1 {
            grid-template-columns: repeat(1, 1fr);
        }

        .grid-cols-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .grid-cols-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        @media (max-width: 1024px) {
            .grid-cols-3 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .grid-cols-2,
            .grid-cols-3 {
                grid-template-columns: repeat(1, 1fr);
            }
            
            .grid {
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .grid {
                gap: 0.75rem;
            }
        }

        /* Flex Utilities */
        .flex {
            display: flex;
        }

        .flex-col {
            flex-direction: column;
        }

        .flex-wrap {
            flex-wrap: wrap;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .justify-center {
            justify-content: center;
        }

        .text-center {
            text-align: center;
        }

        /* Spacing Utilities */
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mb-8 { margin-bottom: 2rem; }
        
        .mt-4 { margin-top: 1rem; }
        .mt-6 { margin-top: 1.5rem; }
        .mt-8 { margin-top: 2rem; }

        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .p-8 { padding: 2rem; }

        /* Mobile Menu Button */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 60;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            cursor: pointer;
            font-size: 1.25rem;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hover-scale {
            transition: transform 0.2s ease;
        }

        .hover-scale:hover {
            transform: scale(1.02);
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: var(--sidebar);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            max-width: calc(100vw - 40px);
        }

        @media (max-width: 480px) {
            .notification {
                top: 10px;
                right: 10px;
                left: 10px;
                padding: 0.75rem 1rem;
                font-size: 0.875rem;
            }
        }

        .notification.success {
            background-color: var(--success);
        }

        .notification.error {
            background-color: var(--danger);
        }

        .notification.info {
            background-color: var(--accent);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Utility Classes */
        .hidden { display: none; }
        .w-full { width: 100%; }
        .max-w-md { max-width: 28rem; }
        .max-w-lg { max-width: 32rem; }
        .max-w-xl { max-width: 36rem; }
        .text-sm { font-size: 0.875rem; }
        .text-lg { font-size: 1.125rem; }
        .text-xl { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }
        .font-bold { font-weight: 700; }
        .font-medium { font-weight: 500; }
        .text-gray-400 { color: #9ca3af; }
        .text-gray-500 { color: #6b7280; }
        .text-white { color: white; }
        .text-black { color: black; }
        .bg-white { background-color: white; }
        .border-gray-300 { border-color: #d1d5db; }
        .rounded-lg { border-radius: 8px; }
        .rounded-full { border-radius: 50%; }
        .shadow-lg { box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <div id="app">
        <!-- Mobile Menu Button -->
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Login Screen -->
        <div id="loginScreen" class="min-h-screen flex items-center justify-center">
            <div class="container">
                <div class="card max-w-md">
                    <div class="text-center mb-8">
                        <div class="w-16 h-16 bg-accent rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-tasks text-2xl text-white"></i>
                        </div>
                        <h1 class="text-2xl font-bold mb-2">TaskTracker Pro</h1>
                        <p class="text-gray-400">Professional Task Management</p>
                    </div>

                    <form id="loginForm" class="space-y-6">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <div class="relative">
                                <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                <input type="email" id="email" value="admin@test.com" required
                                       class="form-input pl-10">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                <input type="password" id="password" value="admin123" required
                                       class="form-input pl-10">
                            </div>
                        </div>

                        <button type="submit" id="loginBtn" class="btn btn-primary w-full">
                            <span class="btn-text">Sign In</span>
                            <div class="loading hidden"></div>
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboardScreen" class="hidden">
            <div class="flex">
                <!-- Sidebar -->
                <div class="sidebar w-64 p-6 custom-scrollbar">
                    <div class="text-center mb-8">
                        <div class="w-12 h-12 bg-accent rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-tasks text-white"></i>
                        </div>
                        <h2 class="text-lg font-bold text-white">TaskTracker</h2>
                    </div>

                    <nav class="space-y-2">
                        <button onclick="showDashboard()" class="btn btn-secondary w-full text-left">
                            <i class="fas fa-home mr-3"></i>Dashboard
                        </button>
                        <button onclick="showTasks()" class="btn btn-secondary w-full text-left">
                            <i class="fas fa-tasks mr-3"></i>Tasks
                        </button>
                        <button onclick="showAnalytics()" class="btn btn-secondary w-full text-left">
                            <i class="fas fa-chart-bar mr-3"></i>Analytics
                        </button>
                        <button onclick="showSettings()" class="btn btn-secondary w-full text-left">
                            <i class="fas fa-cog mr-3"></i>Settings
                        </button>
                        <button onclick="logout()" class="btn btn-danger w-full text-left mt-8">
                            <i class="fas fa-sign-out-alt mr-3"></i>Logout
                        </button>
                    </nav>
                </div>

                <!-- Main Content -->
                <div class="main-content">
                    <div class="container p-6">
                        <!-- Dashboard Content -->
                        <div id="dashboardContent" class="fade-in">
                            <h1 class="text-2xl font-bold mb-8">Dashboard</h1>
                            
                            <div class="grid grid-cols-3 mb-8">
                                <div class="card">
                                    <div class="flex items-center">
                                        <div class="w-12 h-12 bg-accent rounded-full flex items-center justify-center mr-4">
                                            <i class="fas fa-tasks text-white"></i>
                                        </div>
                                        <div>
                                            <p class="text-sm text-gray-500">Total Tasks</p>
                                            <p class="text-2xl font-bold" id="totalTasks">0</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="card">
                                    <div class="flex items-center">
                                        <div class="w-12 h-12 bg-success rounded-full flex items-center justify-center mr-4">
                                            <i class="fas fa-check text-white"></i>
                                        </div>
                                        <div>
                                            <p class="text-sm text-gray-500">Completed</p>
                                            <p class="text-2xl font-bold" id="completedTasks">0</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="card">
                                    <div class="flex items-center">
                                        <div class="w-12 h-12 bg-warning rounded-full flex items-center justify-center mr-4">
                                            <i class="fas fa-clock text-white"></i>
                                        </div>
                                        <div>
                                            <p class="text-sm text-gray-500">Pending</p>
                                            <p class="text-2xl font-bold" id="pendingTasks">0</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Quick Add Task -->
                            <div class="card">
                                <h3 class="text-lg font-bold mb-4">Quick Add Task</h3>
                                <form id="quickAddForm" class="flex gap-4">
                                    <input type="text" id="quickTaskTitle" placeholder="Enter task title..." 
                                           class="form-input flex-1">
                                    <select id="quickTaskPriority" class="form-input w-32">
                                        <option value="Low">Low</option>
                                        <option value="Medium" selected>Medium</option>
                                        <option value="High">High</option>
                                    </select>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-plus mr-2"></i>Add Task
                                    </button>
                                </form>
                            </div>

                            <!-- Recent Tasks -->
                            <div class="card">
                                <h3 class="text-lg font-bold mb-4">Recent Tasks</h3>
                                <div id="recentTasks" class="space-y-4">
                                    <p class="text-gray-500 text-center">No tasks yet. Add your first task above!</p>
                                </div>
                            </div>
                        </div>

                        <!-- Tasks Content -->
                        <div id="tasksContent" class="hidden fade-in">
                            <div class="flex justify-between items-center mb-8">
                                <h1 class="text-2xl font-bold">Tasks</h1>
                                <button onclick="showAddTaskModal()" class="btn btn-primary">
                                    <i class="fas fa-plus mr-2"></i>Add Task
                                </button>
                            </div>

                            <div class="card">
                                <div id="tasksList" class="space-y-4">
                                    <p class="text-gray-500 text-center">No tasks found.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Analytics Content -->
                        <div id="analyticsContent" class="hidden fade-in">
                            <h1 class="text-2xl font-bold mb-8">Analytics</h1>
                            
                            <div class="grid grid-cols-2 mb-8">
                                <div class="card">
                                    <h3 class="text-lg font-bold mb-4">Task Status</h3>
                                    <canvas id="statusChart"></canvas>
                                </div>
                                
                                <div class="card">
                                    <h3 class="text-lg font-bold mb-4">Weekly Progress</h3>
                                    <canvas id="weeklyChart"></canvas>
                                </div>
                            </div>
                        </div>

                        <!-- Settings Content -->
                        <div id="settingsContent" class="hidden fade-in">
                            <h1 class="text-2xl font-bold mb-8">Settings</h1>
                            
                            <div class="card max-w-lg">
                                <h3 class="text-lg font-bold mb-4">Profile</h3>
                                <form id="profileForm" class="space-y-6">
                                    <div class="form-group">
                                        <label class="form-label">Name</label>
                                        <input type="text" id="userName" class="form-input">
                                    </div>
                                    
                                    <div class="form-group">
                                        <label class="form-label">Email</label>
                                        <input type="email" id="userEmail" class="form-input" readonly>
                                    </div>
                                    
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save mr-2"></i>Save Changes
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentUser = null;
        let tasks = [];
        let currentPage = 'dashboard';

        // API Configuration
        const API_BASE = 'https://task-tracker-vr1u.onrender.com/api';

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
        });

        // Mobile menu toggle
        function toggleMobileMenu() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('open');
        }

        // Authentication
        function checkAuth() {
            const user = localStorage.getItem('user');
            if (user) {
                currentUser = JSON.parse(user);
                showDashboard();
            } else {
                showLogin();
            }
        }

        function showLogin() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            currentPage = 'dashboard';
            loadDashboard();
        }

        function logout() {
            localStorage.removeItem('user');
            currentUser = null;
            showLogin();
        }

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const btn = document.getElementById('loginBtn');
            const btnText = btn.querySelector('.btn-text');
            const loading = btn.querySelector('.loading');
            
            btnText.classList.add('hidden');
            loading.classList.remove('hidden');
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });
                
                const data = await response.json();
                
                if (response.ok && data.user) {
                    currentUser = data.user;
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    showNotification('Login successful!', 'success');
                    showDashboard();
                } else {
                    showNotification('Login failed: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showNotification('Connection error. Please check your backend.', 'error');
            } finally {
                btnText.classList.remove('hidden');
                loading.classList.add('hidden');
            }
        });

        // Navigation functions
        function showTasks() {
            currentPage = 'tasks';
            hideAllContent();
            document.getElementById('tasksContent').classList.remove('hidden');
            loadTasks();
        }

        function showAnalytics() {
            currentPage = 'analytics';
            hideAllContent();
            document.getElementById('analyticsContent').classList.remove('hidden');
            loadAnalytics();
        }

        function showSettings() {
            currentPage = 'settings';
            hideAllContent();
            document.getElementById('settingsContent').classList.remove('hidden');
            loadSettings();
        }

        function hideAllContent() {
            document.getElementById('dashboardContent').classList.add('hidden');
            document.getElementById('tasksContent').classList.add('hidden');
            document.getElementById('analyticsContent').classList.add('hidden');
            document.getElementById('settingsContent').classList.add('hidden');
        }

        // Load functions
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/tasks?user_id=${currentUser.id}`);
                const data = await response.json();
                tasks = data;
                
                updateStats();
                renderRecentTasks();
            } catch (error) {
                showNotification('Failed to load dashboard', 'error');
            }
        }

        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks?user_id=${currentUser.id}`);
                const data = await response.json();
                tasks = data;
                renderTasks();
            } catch (error) {
                showNotification('Failed to load tasks', 'error');
            }
        }

        async function loadAnalytics() {
            try {
                const response = await fetch(`${API_BASE}/analytics?user_id=${currentUser.id}`);
                const data = await response.json();
                
                // Create charts
                createStatusChart(data.today);
                createWeeklyChart(data.week);
            } catch (error) {
                showNotification('Failed to load analytics', 'error');
            }
        }

        function loadSettings() {
            if (currentUser) {
                document.getElementById('userName').value = currentUser.name || '';
                document.getElementById('userEmail').value = currentUser.email || '';
            }
        }

        // Render functions
        function updateStats() {
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(task => task.status === 'Completed').length;
            const pendingTasks = tasks.filter(task => task.status === 'Pending').length;
            
            document.getElementById('totalTasks').textContent = totalTasks;
            document.getElementById('completedTasks').textContent = completedTasks;
            document.getElementById('pendingTasks').textContent = pendingTasks;
        }

        function renderRecentTasks() {
            const container = document.getElementById('recentTasks');
            const recentTasks = tasks.slice(0, 5);
            
            if (recentTasks.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center">No tasks yet. Add your first task above!</p>';
                return;
            }
            
            container.innerHTML = recentTasks.map(task => `
                <div class="task-item">
                    <div class="task-title">${task.title}</div>
                    <div class="flex gap-2">
                        <span class="badge priority-${task.priority.toLowerCase()}">${task.priority}</span>
                        <span class="badge status-${task.status.toLowerCase().replace(' ', '-')}">${task.status}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderTasks() {
            const container = document.getElementById('tasksList');
            
            if (tasks.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center">No tasks found.</p>';
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="task-item">
                    <div class="task-title">${task.title}</div>
                    <div class="flex gap-2">
                        <span class="badge priority-${task.priority.toLowerCase()}">${task.priority}</span>
                        <span class="badge status-${task.status.toLowerCase().replace(' ', '-')}">${task.status}</span>
                        <button onclick="updateTaskStatus(${task.id}, 'Completed')" class="btn btn-success btn-sm">
                            <i class="fas fa-check"></i>
                        </button>
                        <button onclick="deleteTask(${task.id})" class="btn btn-danger btn-sm">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Task operations
        document.getElementById('quickAddForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const title = document.getElementById('quickTaskTitle').value;
            const priority = document.getElementById('quickTaskPriority').value;
            
            if (!title) return;
            
            try {
                const response = await fetch(`${API_BASE}/tasks`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        title, 
                        priority, 
                        user_id: currentUser.id 
                    }),
                });
                
                if (response.ok) {
                    showNotification('Task created successfully!', 'success');
                    document.getElementById('quickTaskTitle').value = '';
                    loadDashboard();
                } else {
                    showNotification('Failed to create task', 'error');
                }
            } catch (error) {
                showNotification('Connection error', 'error');
            }
        });

        async function updateTaskStatus(taskId, status) {
            try {
                const response = await fetch(`${API_BASE}/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ status }),
                });
                
                if (response.ok) {
                    showNotification('Task updated successfully!', 'success');
                    loadTasks();
                } else {
                    showNotification('Failed to update task', 'error');
                }
            } catch (error) {
                showNotification('Connection error', 'error');
            }
        }

        async function deleteTask(taskId) {
            if (!confirm('Are you sure you want to delete this task?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/tasks/${taskId}`, {
                    method: 'DELETE',
                });
                
                if (response.ok) {
                    showNotification('Task deleted successfully!', 'success');
                    loadTasks();
                } else {
                    showNotification('Failed to delete task', 'error');
                }
            } catch (error) {
                showNotification('Connection error', 'error');
            }
        }

        // Chart functions
        function createStatusChart(data) {
            const ctx = document.getElementById('statusChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Completed', 'Pending', 'In Progress'],
                    datasets: [{
                        data: [
                            data.Completed || 0,
                            data.Pending || 0,
                            data['In Progress'] || 0
                        ],
                        backgroundColor: ['#22c55e', '#f59e0b', '#3b82f6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function createWeeklyChart(data) {
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        label: 'Tasks Created',
                        data: Object.values(data),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        // Notification function
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
    </script>
</body>
</html>
