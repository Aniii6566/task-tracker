<!DOCTYPE html>
<html>
<head>
    <title>Simple Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 20px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Simple Login Test</h1>
    <button onclick="testLogin()">Test Login</button>
    <div id="result"></div>
    
    <script>
        async function testLogin() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing...';
            
            try {
                console.log('Starting login test...');
                console.log('API URL:', 'http://localhost:5000/api/auth/login');
                
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: 'admin@test.com',
                        password: 'admin123'
                    })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok && data.status === 'success') {
                    result.innerHTML = `
                        <div class="result success">
                            <h2>SUCCESS!</h2>
                            <p>User: ${data.user.name}</p>
                            <p>Email: ${data.user.email}</p>
                            <p>Token: ${data.token}</p>
                            <p><button onclick="storeAndGo('${data.token}', '${JSON.stringify(data.user).replace(/"/g, '\\"')}')">Store & Go to Main App</button></p>
                            <p><a href="index_ui_fixed.html" target="_blank">Open Main App Directly</a></p>
                        </div>
                    `;
                } else {
                    result.innerHTML = `
                        <div class="result error">
                            <h2>FAILED!</h2>
                            <p>Error: ${data.error || 'Unknown'}</p>
                            <p>Status: ${response.status}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Login error:', error);
                result.innerHTML = `
                    <div class="result error">
                        <h2>ERROR!</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        function storeAndGo(token, user) {
            localStorage.setItem('token', token);
            localStorage.setItem('user', user);
            window.location.href = 'index_ui_fixed.html';
        }
    </script>
</body>
</html>
